<svg xmlns="http://www.w3.org/2000/svg" width="220" height="52" viewBox="0 0 220 52">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F7FFA"/>
      <stop offset="100%" stop-color="#8B3FEC"/>
    </linearGradient>
    <linearGradient id="gt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F7FFA"/>
      <stop offset="100%" stop-color="#8B3FEC"/>
    </linearGradient>
  </defs>

  <!-- Document icon with fold at top-right -->
  <path d="M6,4 L32,4 L44,16 L44,46 Q44,48 42,48 L8,48 Q6,48 6,46 L6,6 Q6,4 8,4 Z"
        fill="white" stroke="url(#g)" stroke-width="2.8" stroke-linejoin="round"/>
  <!-- Fold crease -->
  <path d="M32,4 L32,16 L44,16" fill="none" stroke="url(#g)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Diagonal edit stroke -->
  <line x1="14" y1="38" x2="32" y2="20" stroke="url(#g)" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Pen dot -->
  <circle cx="12.5" cy="40" r="2.5" fill="url(#g)"/>

  <!-- Wordmark: EditPDF in dark navy -->
  <text x="58" y="36"
        font-family="'Plus Jakarta Sans','DM Sans',system-ui,-apple-system,sans-serif"
        font-size="26" font-weight="800" letter-spacing="-1"
        fill="#0D1B4B">EditPDF</text>

  <!-- AI in gradient -->
  <text x="174" y="36"
        font-family="'Plus Jakarta Sans','DM Sans',system-ui,-apple-system,sans-serif"
        font-size="26" font-weight="800" letter-spacing="-1"
        fill="url(#gt)"> AI</text>
</svg>
